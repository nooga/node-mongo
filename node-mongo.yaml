# Environment groups
##

dev:
  defines: group
  members:
    - node-mongo/dev-atlas-project
    - node-mongo/dev-atlas-cluster
    - node-mongo/dev-atlas-user
    - node-mongo/app-dev

staging:
  defines: group
  members:
    - node-mongo/staging-atlas-project
