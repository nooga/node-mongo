namespace: node-mongo

##
# MongoDB Atlas (managed) + Node.js Express app
#
# Notes:
# - `mongodb-atlas/user` will write a generated password into `password_secret_ref`
#   if the secret doesn't exist yet. Therefore we do NOT list ${env}-mongodb-password
#   in MANIFEST SECRET (it's internal).
# - `allow_ips: ["0.0.0.0/0"]` is open to the world (demo-friendly, not production-safe).
##

app-base:
  defines: runnable
  containers:
    main:
      image: app:latest
  services:
    http:
      container: main
      port: 3000
      protocol: tcp
      ingress-routes:
        app:
          path-prefix: /
  variables:
    port:
      type: int
      value: 3000
      env: PORT
    mongodb-uri:
      type: string
      # Full Atlas connection string (mongodb+srv://...), provided by the Atlas cluster entity.
      value: <- connection-target("mongo-cluster") entity-state get-member("connection_srv")
      env: MONGODB_URI
    mongodb-username:
      type: string
      value: <- connection-target("mongo-user") entity-state get-member("name")
      env: MONGODB_USERNAME
    mongodb-password:
      type: string
      # overridden by env-specific runnable to use the correct secret name
      value: "CHANGE-ME"
      env: MONGODB_PASSWORD

app-dev:
  defines: runnable
  inherits: node-mongo/app-base
  scale:
    value: 1
  connections:
    mongo-cluster:
      target: node-mongo/dev-atlas-cluster
      service: data
    mongo-user:
      target: node-mongo/dev-atlas-user
      service: data
  depends:
    wait-for:
      runnables:
        - node-mongo/dev-atlas-cluster
        - node-mongo/dev-atlas-user
      timeout: 600
  variables:
    node-env:
      type: string
      value: dev
      env: NODE_ENV
    mongodb-password:
      type: string
      value: <- secret("dev-mongodb-password")
      env: MONGODB_PASSWORD
  permitted-secrets:
    dev-mongodb-password: true

app-staging:
  defines: runnable
  inherits: node-mongo/app-base
  scale:
    value: 1
  connections:
    mongo-cluster:
      target: node-mongo/staging-atlas-cluster
      service: data
    mongo-user:
      target: node-mongo/staging-atlas-user
      service: data
  depends:
    wait-for:
      runnables:
        - node-mongo/staging-atlas-cluster
        - node-mongo/staging-atlas-user
      timeout: 600
  variables:
    node-env:
      type: string
      value: staging
      env: NODE_ENV
    mongodb-password:
      type: string
      value: <- secret("staging-mongodb-password")
      env: MONGODB_PASSWORD
  permitted-secrets:
    staging-mongodb-password: true

app-prod:
  defines: runnable
  inherits: node-mongo/app-base
  scale:
    value: 2
  connections:
    mongo-cluster:
      target: node-mongo/prod-atlas-cluster
      service: data
    mongo-user:
      target: node-mongo/prod-atlas-user
      service: data
  depends:
    wait-for:
      runnables:
        - node-mongo/prod-atlas-cluster
        - node-mongo/prod-atlas-user
      timeout: 600
  variables:
    node-env:
      type: string
      value: production
      env: NODE_ENV
    mongodb-password:
      type: string
      value: <- secret("prod-mongodb-password")
      env: MONGODB_PASSWORD
  permitted-secrets:
    prod-mongodb-password: true

##
# MongoDB Atlas - DEV
##

dev-atlas-project:
  defines: mongodb-atlas/project
  name: monk-node-mongo-dev-project
  organization: <- secret("default-mongodb-org")
  secret_ref: default-mongodb-token
  services:
    data:
      protocol: custom
  permitted-secrets:
    default-mongodb-token: true
    default-mongodb-org: true

dev-atlas-user:
  defines: mongodb-atlas/user
  name: monk-node-mongo-dev-user
  role: readWriteAnyDatabase
  project_id: <- connection-target("project") entity-state get-member("id")
  secret_ref: default-mongodb-token
  password_secret_ref: dev-mongodb-password
  services:
    data:
      protocol: custom
  connections:
    project:
      target: node-mongo/dev-atlas-project
      service: data
  depends:
    wait-for:
      runnables:
        - node-mongo/dev-atlas-project
      timeout: 300
  permitted-secrets:
    default-mongodb-token: true
    dev-mongodb-password: true

dev-atlas-cluster:
  defines: mongodb-atlas/cluster
  name: monk-node-mongo-dev-cluster
  provider: AWS
  region: US_EAST_1
  instance_size: M0
  # Demo-friendly; for production, restrict to trusted IPs/CIDRs.
  allow_ips:
    - "0.0.0.0/0"
  project_id: <- connection-target("project") entity-state get-member("id")
  secret_ref: default-mongodb-token
  services:
    data:
      protocol: custom
  connections:
    project:
      target: node-mongo/dev-atlas-project
      service: data
  depends:
    wait-for:
      runnables:
        - node-mongo/dev-atlas-project
      timeout: 600
  permitted-secrets:
    default-mongodb-token: true

