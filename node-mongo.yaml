namespace: node-mongo

atlas-project:
  defines: mongodb-atlas/project
  name: monk-node-mongo-dev-project
  organization: <- secret("default-mongodb-org")
  secret_ref: default-mongodb-token
  services:
    data:
      protocol: custom
  permitted-secrets:
    default-mongodb-token: true
    default-mongodb-org: true

atlas-user:
  defines: mongodb-atlas/user
  name: monk-node-mongo-atlas-user
  # NOTE: mongodb-atlas/user currently applies the role on the "admin" database.
  # Using readWriteAnyDatabase (an admin DB role) grants read/write on all databases,
  # including the application DB used by this stack ("test").
  role: readWriteAnyDatabase
  project_id: <- connection-target("project") entity-state get-member("id")
  secret_ref: default-mongodb-token
  password_secret_ref: atlas-mongodb-password
  services:
    data:
      protocol: custom
  connections:
    project:
      target: node-mongo/atlas-project
      service: data
  depends:
    wait-for:
      runnables:
        - node-mongo/atlas-project
      timeout: 300
  permitted-secrets:
    default-mongodb-token: true
    atlas-mongodb-password: true

atlas-cluster:
  defines: mongodb-atlas/cluster
  name: monk-node-mongo-atlas-cluster
  provider: AWS
  region: US_EAST_1
  instance_size: M0
  # Demo-friendly; for production, restrict to trusted IPs/CIDRs.
  allow_ips:
    - "0.0.0.0/0"
  project_id: <- connection-target("project") entity-state get-member("id")
  secret_ref: default-mongodb-token
  services:
    data:
      protocol: custom
  connections:
    project:
      target: node-mongo/atlas-project
      service: data
  depends:
    wait-for:
      runnables:
        - node-mongo/atlas-project
      timeout: 600
  permitted-secrets:
    default-mongodb-token: true

backend:
  defines: runnable
  metadata:
    name: backend
    description: A Node.js application with MongoDB integration.
  containers:
    main:
      image: "backend:latest"
  services:
    http:
      description: HTTP service for the backend application.
      protocol: tcp
      port: <- $port
      container: main
      ingress-routes:
        api:
          path-prefix: /
  variables:
    port:
      type: int
      env: PORT
      description: Port on which the application runs.
      value: 3000
    node-env:
      type: string
      env: NODE_ENV
      description: Environment mode for the application.
      value: development
    mongodb-uri:
      type: string
      env: MONGODB_URI
      # The Atlas SRV string typically does not include a database name.
      # If no DB is provided, MongoDB drivers default to "test" (which this app uses),
      # but we make it explicit to avoid ambiguity.
      value: <- `${mongodb-srv}/${mongodb-db-name}`
    mongodb-srv:
      type: string
      description: MongoDB Atlas SRV connection string (without database name).
      value: <- connection-target("mongodb") entity-state get-member("connection_srv")
    mongodb-db-name:
      type: string
      description: Database name to use within the MongoDB connection string.
      value: test
    mongodb-user:
      type: string
      description: MongoDB Atlas database user (from provisioned Atlas user entity).
      env: MONGODB_USERNAME
      value: <- connection-target("mongodb-user") entity-state get-member("name")
    mongodb-password:
      type: string
      value: <- secret("atlas-mongodb-password")
      env: MONGODB_PASSWORD
  permitted-secrets:
    atlas-mongodb-password: true
  connections:
    mongodb:
      target: node-mongo/atlas-cluster
      service: data
    mongodb-user:
      target: node-mongo/atlas-user
      service: data
  depends:
    wait-for:
      runnables:
        - node-mongo/atlas-cluster
        - node-mongo/atlas-user
      timeout: 900

stack:
  defines: group
  members:
    - node-mongo/atlas-project
    - node-mongo/atlas-cluster
    - node-mongo/atlas-user
    - node-mongo/backend
 