<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Node.js MongoDB Demo</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: #0b0f14;
        color: #e5e7eb;
        min-height: 100vh;
        padding: 20px;
      }

      .container {
        max-width: 800px;
        margin: 0 auto;
        background: #11161d;
        border-radius: 16px;
        border: 1px solid #1f2937;
        box-shadow: 0 12px 28px rgba(0, 0, 0, 0.35);
        overflow: hidden;
      }

      .header {
        background: #11161d;
        color: #f9fafb;
        padding: 30px;
        text-align: center;
        border-bottom: 1px solid #1f2937;
      }

      .header h1 {
        font-size: 2.5rem;
        margin-bottom: 10px;
      }

      .status {
        padding: 20px;
        margin: 20px;
        border-radius: 10px;
        font-weight: bold;
        text-align: center;
      }

      .status.connected {
        background: #0f1f17;
        color: #86efac;
        border: 1px solid #14532d;
      }

      .status.disconnected {
        background: #291216;
        color: #fda4af;
        border: 1px solid #7f1d1d;
      }

      .form-section {
        padding: 30px;
        border-bottom: 1px solid #1f2937;
      }

      .form-section h2 {
        color: #f3f4f6;
        margin-bottom: 20px;
        font-size: 1.5rem;
        font-weight: 600;
      }

      .form-group {
        margin-bottom: 20px;
      }

      .form-group label {
        display: block;
        margin-bottom: 8px;
        color: #cbd5e1;
        font-weight: 500;
      }

      .form-group input {
        width: 100%;
        padding: 12px;
        background: #0f141b;
        color: #f3f4f6;
        border: 1px solid #334155;
        border-radius: 8px;
        font-size: 16px;
        transition: border-color 0.2s, box-shadow 0.2s;
      }

      .form-group input:focus {
        outline: none;
        border-color: #94a3b8;
        box-shadow: 0 0 0 3px rgba(148, 163, 184, 0.18);
      }

      .btn {
        background: #f8fafc;
        color: #0b0f14;
        border: 1px solid #f1f5f9;
        padding: 12px 30px;
        border-radius: 8px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: transform 0.15s, opacity 0.15s;
      }

      .btn:hover {
        transform: translateY(-2px);
        opacity: 0.92;
      }

      .btn:active {
        transform: translateY(0);
      }

      .users-section {
        padding: 30px;
      }

      .user-card {
        background: #151c24;
        border: 1px solid #273244;
        border-radius: 10px;
        padding: 20px;
        margin-bottom: 15px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        transition: transform 0.2s;
      }

      .user-card:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 18px rgba(0, 0, 0, 0.25);
      }

      .user-info h3 {
        color: #f3f4f6;
        margin-bottom: 5px;
      }

      .user-info p {
        color: #9ca3af;
        font-size: 14px;
      }

      .delete-btn {
        background: #b91c1c;
        color: #fee2e2;
        border: none;
        padding: 8px 16px;
        border-radius: 5px;
        cursor: pointer;
        font-size: 14px;
      }

      .delete-btn:hover {
        background: #991b1b;
      }

      .loading {
        text-align: center;
        padding: 20px;
        color: #9ca3af;
      }

      .error {
        background: #291216;
        color: #fda4af;
        padding: 15px;
        border-radius: 5px;
        margin: 20px;
        border: 1px solid #7f1d1d;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .fade-in {
        animation: fadeIn 0.3s ease-out;
      }

      #confettiCanvas {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 1000;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>Node.js MongoDB Demo</h1>
        <p>Clean UI with database integration</p>
      </div>

      <div id="status" class="status">
        <div class="loading">Checking database connection...</div>
      </div>

      <div class="form-section">
        <h2>Add New User</h2>
        <form id="userForm">
          <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" required />
          </div>
          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" required />
          </div>
          <button type="submit" class="btn">Add User</button>
        </form>
      </div>

      <div class="users-section">
        <h2>Users in Database</h2>
        <div id="usersList">
          <div class="loading">Loading users...</div>
        </div>
      </div>
    </div>
    <canvas id="confettiCanvas"></canvas>

    <script>
      class App {
        constructor() {
          this.statusEl = document.getElementById("status");
          this.usersListEl = document.getElementById("usersList");
          this.userForm = document.getElementById("userForm");
          this.confettiCanvas = document.getElementById("confettiCanvas");
          this.confettiCtx = this.confettiCanvas.getContext("2d");
          this.resizeConfettiCanvas();
          window.addEventListener("resize", () => this.resizeConfettiCanvas());

          this.init();
        }

        async init() {
          await this.checkHealth();
          await this.loadUsers();
          this.setupEventListeners();
        }

        setupEventListeners() {
          this.userForm.addEventListener("submit", (e) =>
            this.handleAddUser(e)
          );
        }

        async checkHealth() {
          try {
            const response = await fetch("/api/health");
            const data = await response.json();

            if (data.database === "connected") {
              this.statusEl.innerHTML = `
                            <div class="connected">
                                ✅ Database Connected - ${data.timestamp}
                            </div>
                        `;
              this.statusEl.className = "status connected";
            } else {
              this.statusEl.innerHTML = `
                            <div class="disconnected">
                                ❌ Database Disconnected
                            </div>
                        `;
              this.statusEl.className = "status disconnected";
            }
          } catch (error) {
            this.statusEl.innerHTML = `
                        <div class="disconnected">
                            ❌ Connection Error: ${error.message}
                        </div>
                    `;
            this.statusEl.className = "status disconnected";
          }
        }

        async loadUsers() {
          try {
            const response = await fetch("/api/users");
            const users = await response.json();

            if (users.length === 0) {
              this.usersListEl.innerHTML =
                '<p class="loading">No users found. Add some users to get started!</p>';
              return;
            }

            this.usersListEl.innerHTML = users
              .map(
                (user) => `
                        <div class="user-card fade-in">
                            <div class="user-info">
                                <h3>${this.escapeHtml(user.name)}</h3>
                                <p>${this.escapeHtml(user.email)}</p>
                                <p><small>Added: ${new Date(
                                  user.createdAt
                                ).toLocaleString()}</small></p>
                            </div>
                            <button class="delete-btn" onclick="app.deleteUser('${
                              user._id
                            }')">
                                Delete
                            </button>
                        </div>
                    `
              )
              .join("");
          } catch (error) {
            this.usersListEl.innerHTML = `<div class="error">Error loading users: ${error.message}</div>`;
          }
        }

        async handleAddUser(e) {
          e.preventDefault();

          const formData = new FormData(e.target);
          const userData = {
            name: formData.get("name"),
            email: formData.get("email"),
          };

          try {
            const response = await fetch("/api/users", {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
              },
              body: JSON.stringify(userData),
            });

            if (response.ok) {
              e.target.reset();
              this.celebrateSave();
              await this.loadUsers();
              await this.checkHealth();
            } else {
              const error = await response.json();
              alert(`Error: ${error.error}`);
            }
          } catch (error) {
            alert(`Error: ${error.message}`);
          }
        }

        async deleteUser(userId) {
          if (!confirm("Are you sure you want to delete this user?")) return;

          try {
            const response = await fetch(`/api/users/${userId}`, {
              method: "DELETE",
            });

            if (response.ok) {
              await this.loadUsers();
            } else {
              const error = await response.json();
              alert(`Error: ${error.error}`);
            }
          } catch (error) {
            alert(`Error: ${error.message}`);
          }
        }

        escapeHtml(text) {
          const div = document.createElement("div");
          div.textContent = text;
          return div.innerHTML;
        }

        resizeConfettiCanvas() {
          this.confettiCanvas.width = window.innerWidth;
          this.confettiCanvas.height = window.innerHeight;
        }

        celebrateSave() {
          const colors = ["#f8fafc", "#a5b4fc", "#86efac", "#f9a8d4", "#fcd34d"];
          const pieces = Array.from({ length: 130 }, () => ({
            x: window.innerWidth / 2 + (Math.random() - 0.5) * 80,
            y: window.innerHeight * 0.25,
            vx: (Math.random() - 0.5) * 8,
            vy: Math.random() * -10 - 6,
            gravity: 0.22 + Math.random() * 0.18,
            size: 4 + Math.random() * 6,
            color: colors[Math.floor(Math.random() * colors.length)],
            rotation: Math.random() * Math.PI,
            vr: (Math.random() - 0.5) * 0.28,
          }));

          const start = performance.now();
          const duration = 1200;

          const animate = (now) => {
            const elapsed = now - start;
            this.confettiCtx.clearRect(
              0,
              0,
              this.confettiCanvas.width,
              this.confettiCanvas.height
            );

            pieces.forEach((piece) => {
              piece.x += piece.vx;
              piece.y += piece.vy;
              piece.vy += piece.gravity;
              piece.rotation += piece.vr;

              this.confettiCtx.save();
              this.confettiCtx.translate(piece.x, piece.y);
              this.confettiCtx.rotate(piece.rotation);
              this.confettiCtx.fillStyle = piece.color;
              this.confettiCtx.fillRect(
                -piece.size / 2,
                -piece.size / 2,
                piece.size,
                piece.size
              );
              this.confettiCtx.restore();
            });

            if (elapsed < duration) {
              requestAnimationFrame(animate);
            } else {
              this.confettiCtx.clearRect(
                0,
                0,
                this.confettiCanvas.width,
                this.confettiCanvas.height
              );
            }
          };

          requestAnimationFrame(animate);
        }
      }

      // Initialize the app
      const app = new App();
    </script>
  </body>
</html>
