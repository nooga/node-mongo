<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Node.js MongoDB Demo</title>
    <style>
      :root {
        --blue-950: #0a2346;
        --blue-900: #11356d;
        --blue-800: #17458d;
        --blue-700: #1d5cb5;
        --blue-600: #2872d8;
        --blue-500: #3c8dff;
        --blue-100: #e8f1ff;
        --blue-50: #f4f8ff;
        --ink-900: #111827;
        --ink-700: #374151;
        --ink-500: #6b7280;
        --border: #dbe7ff;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: Inter, "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background:
          radial-gradient(circle at top right, rgba(60, 141, 255, 0.24), transparent 40%),
          radial-gradient(circle at bottom left, rgba(29, 92, 181, 0.22), transparent 35%),
          linear-gradient(160deg, #eff5ff 0%, #dbe9ff 100%);
        color: var(--ink-900);
        min-height: 100vh;
        padding: 28px 18px;
      }

      .container {
        max-width: 900px;
        margin: 0 auto;
        background: rgba(255, 255, 255, 0.9);
        border: 1px solid rgba(255, 255, 255, 0.75);
        border-radius: 24px;
        box-shadow: 0 24px 60px rgba(14, 42, 86, 0.18);
        overflow: hidden;
        backdrop-filter: blur(8px);
      }

      .header {
        background: linear-gradient(125deg, var(--blue-950) 0%, var(--blue-700) 55%, var(--blue-500) 100%);
        color: #fff;
        padding: 42px 32px;
        text-align: center;
      }

      .header h1 {
        font-size: clamp(1.8rem, 4vw, 2.6rem);
        line-height: 1.15;
        margin-bottom: 10px;
        letter-spacing: -0.02em;
      }

      .header p {
        color: rgba(255, 255, 255, 0.88);
        font-size: 1rem;
      }

      .status {
        margin: 24px 24px 0;
        border-radius: 14px;
        font-weight: 600;
        text-align: center;
        border: 1px solid transparent;
        padding: 14px 16px;
      }

      .status.connected {
        background: #e8f7ef;
        color: #1f6d43;
        border-color: #bfe9ce;
      }

      .status.disconnected {
        background: #ffeef0;
        color: #8f1d2c;
        border-color: #ffc9d0;
      }

      .form-section,
      .users-section {
        padding: 28px 24px;
      }

      .form-section {
        border-bottom: 1px solid var(--border);
      }

      .form-section h2,
      .users-section h2 {
        color: var(--blue-900);
        margin-bottom: 18px;
        font-size: 1.35rem;
        letter-spacing: -0.01em;
      }

      .form-group {
        margin-bottom: 16px;
      }

      .form-group label {
        display: block;
        margin-bottom: 8px;
        color: var(--ink-700);
        font-weight: 600;
      }

      .form-group input {
        width: 100%;
        padding: 12px 14px;
        border: 1px solid #cddcff;
        border-radius: 10px;
        background: #fbfdff;
        color: var(--ink-900);
        font-size: 15px;
        transition: border-color 0.2s, box-shadow 0.2s, background-color 0.2s;
      }

      .form-group input:hover {
        border-color: #aac4fb;
      }

      .form-group input:focus {
        outline: none;
        background: #fff;
        border-color: var(--blue-500);
        box-shadow: 0 0 0 3px rgba(60, 141, 255, 0.18);
      }

      .btn {
        background: linear-gradient(135deg, var(--blue-700), var(--blue-500));
        color: #fff;
        border: none;
        padding: 11px 18px;
        border-radius: 10px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        transition: transform 0.15s ease, box-shadow 0.2s ease, filter 0.2s ease;
        box-shadow: 0 8px 18px rgba(23, 69, 141, 0.28);
      }

      .btn:hover {
        transform: translateY(-1px);
        filter: brightness(1.03);
      }

      .btn:active {
        transform: translateY(0);
      }

      .user-card {
        background: linear-gradient(180deg, #fff, var(--blue-50));
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 18px;
        margin-bottom: 12px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 14px;
        transition: transform 0.18s ease, box-shadow 0.2s ease;
      }

      .user-card:hover {
        transform: translateY(-1px);
        box-shadow: 0 10px 20px rgba(15, 51, 107, 0.12);
      }

      .user-info h3 {
        color: var(--ink-900);
        margin-bottom: 4px;
      }

      .user-info p {
        color: var(--ink-700);
        font-size: 14px;
      }

      .user-info p small {
        color: var(--ink-500);
      }

      .delete-btn {
        background: #fff;
        color: #b42330;
        border: 1px solid #f2bac0;
        padding: 8px 14px;
        border-radius: 9px;
        cursor: pointer;
        font-size: 13px;
        font-weight: 600;
        transition: background-color 0.2s, border-color 0.2s;
      }

      .delete-btn:hover {
        background: #fff4f5;
        border-color: #ec909a;
      }

      .loading {
        text-align: center;
        padding: 16px;
        color: var(--ink-500);
      }

      .error {
        background: #fff0f2;
        color: #9f1239;
        padding: 14px;
        border-radius: 10px;
        margin: 4px 0;
        border: 1px solid #fecdd3;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .fade-in {
        animation: fadeIn 0.22s ease-out;
      }

      @media (max-width: 680px) {
        body {
          padding: 14px;
        }

        .header {
          padding: 30px 20px;
        }

        .status {
          margin: 16px 16px 0;
        }

        .form-section,
        .users-section {
          padding: 20px 16px;
        }

        .user-card {
          flex-direction: column;
          align-items: flex-start;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>Node.js MongoDB Dashboard</h1>
        <p>Manage users with a clean, modern interface</p>
      </div>

      <div id="status" class="status">
        <div class="loading">Checking database connection...</div>
      </div>

      <div class="form-section">
        <h2>Add New User</h2>
        <form id="userForm">
          <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" required />
          </div>
          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" required />
          </div>
          <button type="submit" class="btn">Add User</button>
        </form>
      </div>

      <div class="users-section">
        <h2>Users in Database</h2>
        <div id="usersList">
          <div class="loading">Loading users...</div>
        </div>
      </div>
    </div>

    <script>
      class App {
        constructor() {
          this.statusEl = document.getElementById("status");
          this.usersListEl = document.getElementById("usersList");
          this.userForm = document.getElementById("userForm");

          this.init();
        }

        async init() {
          await this.checkHealth();
          await this.loadUsers();
          this.setupEventListeners();
        }

        setupEventListeners() {
          this.userForm.addEventListener("submit", (e) =>
            this.handleAddUser(e)
          );
        }

        async checkHealth() {
          try {
            const response = await fetch("/api/health");
            const data = await response.json();

            if (data.database === "connected") {
              this.statusEl.innerHTML = `
                            <div class="connected">
                                ✅ Database Connected - ${data.timestamp}
                            </div>
                        `;
              this.statusEl.className = "status connected";
            } else {
              this.statusEl.innerHTML = `
                            <div class="disconnected">
                                ❌ Database Disconnected
                            </div>
                        `;
              this.statusEl.className = "status disconnected";
            }
          } catch (error) {
            this.statusEl.innerHTML = `
                        <div class="disconnected">
                            ❌ Connection Error: ${error.message}
                        </div>
                    `;
            this.statusEl.className = "status disconnected";
          }
        }

        async loadUsers() {
          try {
            const response = await fetch("/api/users");
            const users = await response.json();

            if (users.length === 0) {
              this.usersListEl.innerHTML =
                '<p class="loading">No users found. Add some users to get started!</p>';
              return;
            }

            this.usersListEl.innerHTML = users
              .map(
                (user) => `
                        <div class="user-card fade-in">
                            <div class="user-info">
                                <h3>${this.escapeHtml(user.name)}</h3>
                                <p>${this.escapeHtml(user.email)}</p>
                                <p><small>Added: ${new Date(
                                  user.createdAt
                                ).toLocaleString()}</small></p>
                            </div>
                            <button class="delete-btn" onclick="app.deleteUser('${
                              user._id
                            }')">
                                Delete
                            </button>
                        </div>
                    `
              )
              .join("");
          } catch (error) {
            this.usersListEl.innerHTML = `<div class="error">Error loading users: ${error.message}</div>`;
          }
        }

        async handleAddUser(e) {
          e.preventDefault();

          const formData = new FormData(e.target);
          const userData = {
            name: formData.get("name"),
            email: formData.get("email"),
          };

          try {
            const response = await fetch("/api/users", {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
              },
              body: JSON.stringify(userData),
            });

            if (response.ok) {
              e.target.reset();
              await this.loadUsers();
              await this.checkHealth();
            } else {
              const error = await response.json();
              alert(`Error: ${error.error}`);
            }
          } catch (error) {
            alert(`Error: ${error.message}`);
          }
        }

        async deleteUser(userId) {
          if (!confirm("Are you sure you want to delete this user?")) return;

          try {
            const response = await fetch(`/api/users/${userId}`, {
              method: "DELETE",
            });

            if (response.ok) {
              await this.loadUsers();
            } else {
              const error = await response.json();
              alert(`Error: ${error.error}`);
            }
          } catch (error) {
            alert(`Error: ${error.message}`);
          }
        }

        escapeHtml(text) {
          const div = document.createElement("div");
          div.textContent = text;
          return div.innerHTML;
        }
      }

      // Initialize the app
      const app = new App();
    </script>
  </body>
</html>
