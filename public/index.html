<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Node.js MongoDB Demo</title>
    <style>
      :root {
        --bg-main: #f0f6ff;
        --bg-gradient: radial-gradient(
            circle at 15% 10%,
            rgba(96, 165, 250, 0.35),
            transparent 35%
          ),
          radial-gradient(
            circle at 85% 85%,
            rgba(37, 99, 235, 0.28),
            transparent 40%
          ),
          linear-gradient(145deg, #eff6ff, #e0edff);
        --surface: #ffffff;
        --surface-soft: #f8fbff;
        --text-primary: #0f172a;
        --text-secondary: #475569;
        --border: #dbeafe;
        --brand: #2563eb;
        --brand-strong: #1d4ed8;
        --danger: #dc2626;
        --danger-strong: #b91c1c;
        --success-bg: #e6f5ec;
        --success-text: #166534;
        --danger-bg: #fde8e8;
        --danger-text: #991b1b;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Inter", "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: var(--bg-gradient);
        color: var(--text-primary);
        min-height: 100vh;
        padding: 24px;
      }

      .container {
        max-width: 880px;
        margin: 0 auto;
        background: rgba(255, 255, 255, 0.86);
        backdrop-filter: blur(8px);
        border: 1px solid rgba(255, 255, 255, 0.65);
        border-radius: 24px;
        box-shadow: 0 24px 48px rgba(15, 23, 42, 0.12);
        overflow: hidden;
      }

      .header {
        background: linear-gradient(135deg, #0f3ca6, #2563eb 55%, #3b82f6);
        color: #ffffff;
        padding: 34px;
        text-align: center;
      }

      .header h1 {
        font-size: 2.2rem;
        letter-spacing: 0.3px;
        margin-bottom: 8px;
      }

      .header p {
        color: rgba(255, 255, 255, 0.9);
        font-size: 1rem;
      }

      .status {
        padding: 14px 16px;
        margin: 20px 24px 8px;
        border-radius: 12px;
        font-weight: 600;
        text-align: center;
        border: 1px solid transparent;
      }

      .status.connected {
        background: var(--success-bg);
        color: var(--success-text);
        border-color: #b8ebca;
      }

      .status.disconnected {
        background: var(--danger-bg);
        color: var(--danger-text);
        border-color: #f6baba;
      }

      .form-section,
      .users-section {
        padding: 26px 28px 30px;
      }

      .form-section {
        border-bottom: 1px solid var(--border);
      }

      .form-section h2,
      .users-section h2 {
        color: #1e3a8a;
        margin-bottom: 18px;
        font-size: 1.2rem;
        font-weight: 700;
      }

      .form-group {
        margin-bottom: 16px;
      }

      .form-group label {
        display: block;
        margin-bottom: 7px;
        color: var(--text-secondary);
        font-weight: 600;
        font-size: 0.92rem;
      }

      .form-group input {
        width: 100%;
        padding: 12px 13px;
        border: 1px solid #c7ddff;
        border-radius: 10px;
        font-size: 0.98rem;
        color: var(--text-primary);
        background: #ffffff;
        transition: border-color 0.2s ease, box-shadow 0.2s ease;
      }

      .form-group input:focus {
        outline: none;
        border-color: #60a5fa;
        box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.16);
      }

      .btn {
        background: linear-gradient(135deg, var(--brand), var(--brand-strong));
        color: #ffffff;
        border: none;
        padding: 11px 24px;
        border-radius: 10px;
        font-size: 0.95rem;
        font-weight: 600;
        cursor: pointer;
        box-shadow: 0 10px 16px rgba(37, 99, 235, 0.24);
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      }

      .btn:hover {
        transform: translateY(-1px);
        box-shadow: 0 14px 20px rgba(37, 99, 235, 0.3);
      }

      .btn:active {
        transform: translateY(0);
      }

      .loading {
        text-align: center;
        padding: 14px;
        color: #64748b;
        background: var(--surface-soft);
        border: 1px dashed #bfdbfe;
        border-radius: 10px;
      }

      .user-card {
        background: linear-gradient(180deg, #ffffff, #f9fcff);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 16px 18px;
        margin-bottom: 12px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 14px;
        transition: transform 0.18s ease, box-shadow 0.18s ease;
      }

      .user-card:hover {
        transform: translateY(-2px);
        box-shadow: 0 12px 24px rgba(30, 64, 175, 0.14);
      }

      .user-info h3 {
        color: var(--text-primary);
        margin-bottom: 3px;
        font-size: 1.03rem;
      }

      .user-info p {
        color: var(--text-secondary);
        font-size: 0.9rem;
        margin-bottom: 2px;
      }

      .timestamp {
        color: #64748b;
        font-size: 0.78rem;
      }

      .delete-btn {
        background: var(--danger);
        color: #ffffff;
        border: none;
        padding: 8px 14px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 0.84rem;
        font-weight: 600;
        transition: background 0.2s ease;
      }

      .delete-btn:hover {
        background: var(--danger-strong);
      }

      .error {
        background: var(--danger-bg);
        color: var(--danger-text);
        padding: 14px;
        border-radius: 10px;
        border: 1px solid #fecaca;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(12px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .fade-in {
        animation: fadeIn 0.25s ease-out;
      }

      @media (max-width: 640px) {
        body {
          padding: 14px;
        }

        .header {
          padding: 24px 18px;
        }

        .header h1 {
          font-size: 1.7rem;
        }

        .form-section,
        .users-section {
          padding: 20px;
        }

        .user-card {
          flex-direction: column;
          align-items: flex-start;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>Node.js MongoDB Dashboard</h1>
        <p>Modern user management with a clean blue theme</p>
      </div>

      <div id="status" class="status">
        <div class="loading">Checking database connection...</div>
      </div>

      <div class="form-section">
        <h2>Add New User</h2>
        <form id="userForm">
          <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" required />
          </div>
          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" required />
          </div>
          <button type="submit" class="btn">Create User</button>
        </form>
      </div>

      <div class="users-section">
        <h2>Users in Database</h2>
        <div id="usersList">
          <div class="loading">Loading users...</div>
        </div>
      </div>
    </div>

    <script>
      class App {
        constructor() {
          this.statusEl = document.getElementById("status");
          this.usersListEl = document.getElementById("usersList");
          this.userForm = document.getElementById("userForm");

          this.init();
        }

        async init() {
          await this.checkHealth();
          await this.loadUsers();
          this.setupEventListeners();
        }

        setupEventListeners() {
          this.userForm.addEventListener("submit", (e) =>
            this.handleAddUser(e)
          );
        }

        async checkHealth() {
          try {
            const response = await fetch("/api/health");
            const data = await response.json();

            if (data.database === "connected") {
              this.statusEl.innerHTML = `✅ Database connected - ${new Date(
                data.timestamp
              ).toLocaleString()}`;
              this.statusEl.className = "status connected";
            } else {
              this.statusEl.innerHTML = "⚠️ Database disconnected";
              this.statusEl.className = "status disconnected";
            }
          } catch (error) {
            this.statusEl.innerHTML = `⚠️ Connection error: ${error.message}`;
            this.statusEl.className = "status disconnected";
          }
        }

        async loadUsers() {
          try {
            const response = await fetch("/api/users");
            const users = await response.json();

            if (users.length === 0) {
              this.usersListEl.innerHTML =
                '<p class="loading">No users found yet. Create the first user to get started.</p>';
              return;
            }

            this.usersListEl.innerHTML = users
              .map(
                (user) => `
                        <div class="user-card fade-in">
                            <div class="user-info">
                                <h3>${this.escapeHtml(user.name)}</h3>
                                <p>${this.escapeHtml(user.email)}</p>
                                <p class="timestamp">Added: ${new Date(
                                  user.createdAt
                                ).toLocaleString()}</p>
                            </div>
                            <button class="delete-btn" onclick="app.deleteUser('${
                              user._id
                            }')">
                                Delete
                            </button>
                        </div>
                    `
              )
              .join("");
          } catch (error) {
            this.usersListEl.innerHTML = `<div class="error">Error loading users: ${error.message}</div>`;
          }
        }

        async handleAddUser(e) {
          e.preventDefault();

          const formData = new FormData(e.target);
          const userData = {
            name: formData.get("name"),
            email: formData.get("email"),
          };

          try {
            const response = await fetch("/api/users", {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
              },
              body: JSON.stringify(userData),
            });

            if (response.ok) {
              e.target.reset();
              await this.loadUsers();
              await this.checkHealth();
            } else {
              const error = await response.json();
              alert(`Error: ${error.error}`);
            }
          } catch (error) {
            alert(`Error: ${error.message}`);
          }
        }

        async deleteUser(userId) {
          if (!confirm("Are you sure you want to delete this user?")) return;

          try {
            const response = await fetch(`/api/users/${userId}`, {
              method: "DELETE",
            });

            if (response.ok) {
              await this.loadUsers();
            } else {
              const error = await response.json();
              alert(`Error: ${error.error}`);
            }
          } catch (error) {
            alert(`Error: ${error.message}`);
          }
        }

        escapeHtml(text) {
          const div = document.createElement("div");
          div.textContent = text;
          return div.innerHTML;
        }
      }

      // Initialize the app
      const app = new App();
    </script>
  </body>
</html>
